services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: admin_demo
    ports:
      - "5432:5432"
    volumes:
      - admin_demo_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d admin_demo"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  admin_demo_pg:
